<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>The Jinadu Wedding — Dinner Entree Selection</title>
</head>
<body style="margin:0;padding:0;">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap');

  :root{
    --ivory:#FAF6F0;
    --wine:#5E2233;
    --wine-deep:#3F1621;
    --gold:#B08D57;
    --charcoal:#2B2320;
    --blush:#EFE1D6;
    --line:#DDCBB8;
    --green:#4C6B4F;
  }
  *{box-sizing:border-box;}
  .jrsvp{
    background:var(--ivory);
    color:var(--charcoal);
    font-family:'Jost',sans-serif;
    min-height:100%;
    padding:0 16px 48px;
    display:flex;
    justify-content:center;
  }
  .jrsvp .wrap{ width:100%; max-width:600px; }

  .jrsvp .header-photo{
    width:calc(100% + 32px);
    margin:0 -16px 28px;
    overflow:hidden;
    max-height:340px;
    position:relative;
  }
  .jrsvp .header-photo img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .jrsvp .header-photo::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:0;
    height:55%;
    background:linear-gradient(to bottom, rgba(43,35,32,0) 0%, rgba(43,35,32,.35) 55%, var(--ivory) 100%);
    pointer-events:none;
  }
  .jrsvp .top-space{ height:36px; }

  .jrsvp h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:500;
    font-size:36px;
    text-align:center;
    margin:0 0 4px;
    color:var(--wine-deep);
    letter-spacing:.5px;
  }
  .jrsvp .sub{
    text-align:center;
    font-size:13px;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:6px;
  }
  .jrsvp .tag{
    text-align:center;
    font-size:15px;
    color:#7a6d60;
    margin-bottom:28px;
    font-style:italic;
    font-family:'Cormorant Garamond',serif;
  }
  .jrsvp .divider{ display:flex;align-items:center;gap:10px; margin:0 0 28px; }
  .jrsvp .divider span{flex:1;height:1px;background:var(--line);}
  .jrsvp .divider em{color:var(--gold);font-style:normal;font-size:12px;}

  .jrsvp .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:2px;
    padding:32px 28px;
    box-shadow:0 20px 40px -30px rgba(63,22,33,.35);
  }
  .jrsvp label{
    display:block; font-size:12px; letter-spacing:1.5px; text-transform:uppercase;
    color:#8a7a6a; margin-bottom:8px;
  }
  .jrsvp input[type=text]{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:2px;
    font-family:'Jost',sans-serif; font-size:15px; background:var(--ivory); color:var(--charcoal);
  }
  .jrsvp input:focus{ outline:2px solid var(--gold); outline-offset:1px; }
  .jrsvp .field{ margin-bottom:20px; }

  .jrsvp .matches{ margin-top:10px; border:1px solid var(--line); border-radius:2px; overflow:hidden; }
  .jrsvp .match-row{
    padding:12px 14px; cursor:pointer; border-bottom:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:center; font-size:14px;
  }
  .jrsvp .match-row:last-child{ border-bottom:none; }
  .jrsvp .match-row:hover{ background:var(--blush); }
  .jrsvp .match-row .hh{ font-family:'Cormorant Garamond',serif; font-size:17px; color:var(--wine-deep); }
  .jrsvp .match-row .cnt{ font-size:11px; color:#9a8c7d; text-transform:uppercase; letter-spacing:1px; }
  .jrsvp .match-row .cnt.done{ color:var(--green); }
  .jrsvp .no-match{ font-size:13px; color:#9a8c7d; margin-top:10px; line-height:1.6; }

  .jrsvp .selected-household{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--blush); border:1px solid var(--gold); border-radius:2px;
    padding:12px 14px; margin-bottom:22px;
  }
  .jrsvp .selected-household .hh{ font-family:'Cormorant Garamond',serif; font-size:19px; color:var(--wine-deep); }
  .jrsvp .selected-household button{ background:none; border:none; color:#8a7a6a; font-size:12px; text-decoration:underline; cursor:pointer; }

  .jrsvp .helper-note{
    background:var(--blush); border-left:3px solid var(--gold); padding:10px 14px;
    font-size:13px; color:#6b5d4f; margin-bottom:22px; line-height:1.5;
  }

  .jrsvp .party{ border-top:1px dashed var(--line); padding-top:20px; margin-top:20px; }
  .jrsvp .party:first-of-type{ border-top:none; margin-top:0; padding-top:0; }
  .jrsvp .party-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; flex-wrap:wrap; gap:6px; }
  .jrsvp .party-names{ font-family:'Cormorant Garamond',serif; font-size:20px; color:var(--wine-deep); }
  .jrsvp .party-status{ font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#9a8c7d; }
  .jrsvp .party-status.done{ color:var(--green); }

  .jrsvp .guest-line{ margin-bottom:16px; }
  .jrsvp .guest-name{ font-size:14px; color:var(--charcoal); margin-bottom:8px; font-weight:500; }
  .jrsvp .guest-diet{ font-size:12px; color:var(--gold); font-style:italic; margin-bottom:8px; }
  .jrsvp .meal-options{ display:flex; flex-direction:column; gap:8px; }
  .jrsvp .meal-opt{
    display:flex; align-items:center; gap:10px; padding:10px 12px;
    border:1px solid var(--line); border-radius:2px; cursor:pointer; font-size:14px;
  }
  .jrsvp .meal-opt:hover{ background:var(--blush); }
  .jrsvp .meal-opt.checked{ border-color:var(--gold); background:var(--blush); }
  .jrsvp .meal-opt input{ accent-color:var(--wine); width:16px; height:16px; }

  .jrsvp .submit-row{ margin-top:18px; }
  .jrsvp button.primary{
    width:100%; padding:13px; background:var(--wine); color:#fff; border:none; border-radius:2px;
    font-family:'Jost',sans-serif; font-size:14px; letter-spacing:1px; text-transform:uppercase;
    cursor:pointer; transition:background .15s;
  }
  .jrsvp button.primary:hover{ background:var(--wine-deep); }
  .jrsvp button.primary:disabled{ background:#c9bfae; cursor:not-allowed; }
  .jrsvp button.ghost{
    background:none; border:1px solid var(--line); color:var(--wine); border-radius:2px;
    padding:9px 14px; font-size:13px; cursor:pointer;
  }
  .jrsvp .party-saved{ text-align:center; font-size:12px; color:var(--green); margin-top:10px; letter-spacing:.5px; }

  .jrsvp .footer-links{ text-align:center; margin-top:26px; }
  .jrsvp .footer-links a{ font-size:12px; color:#9a8c7d; text-decoration:underline; cursor:pointer; }

  .jrsvp .watermark{ display:flex; justify-content:center; margin-top:40px; }
  .jrsvp .watermark img{ width:120px; opacity:.85; }

  /* Planner view */
  .jrsvp.planner-mode .wrap{ max-width:960px; }
  .jrsvp .planner-bar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
  .jrsvp .progress-track{ flex:1; min-width:180px; height:8px; background:var(--blush); border-radius:4px; overflow:hidden; margin:0 14px; }
  .jrsvp .progress-fill{ height:100%; background:var(--wine); }
  .jrsvp .progress-text{ font-size:12px; color:#7a6d60; white-space:nowrap; }
  .jrsvp table.planner-table{ width:100%; border-collapse:collapse; font-size:13px; background:#fff; }
  .jrsvp table.planner-table th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#8a7a6a;
    border-bottom:2px solid var(--line); padding:10px 8px;
  }
  .jrsvp table.planner-table td{ padding:9px 8px; border-bottom:1px solid var(--line); vertical-align:top; }
  .jrsvp table.planner-table tr:hover td{ background:var(--blush); }
  .jrsvp .pill{ font-size:10px; letter-spacing:.5px; text-transform:uppercase; padding:2px 8px; border-radius:20px; display:inline-block; }
  .jrsvp .pill.yes{ background:#e3ecdf; color:var(--green); }
  .jrsvp .pill.no{ background:#f0e6da; color:#9a8c7d; }
  .jrsvp .planner-actions{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .jrsvp .planner-search{ margin-bottom:16px; }

  @media (max-width:480px){
    .jrsvp{ padding:0 12px 40px; }
    .jrsvp h1{ font-size:26px; }
    .jrsvp .sub{ font-size:11px; letter-spacing:1.8px; }
    .jrsvp .tag{ font-size:14px; margin-bottom:20px; }
    .jrsvp .card{ padding:20px 16px; }
    .jrsvp .header-photo{ max-height:220px; margin-bottom:20px; }
    .jrsvp input[type=text]{ font-size:16px; padding:13px 12px; }
    .jrsvp .match-row{ padding:14px; }
    .jrsvp .meal-opt{ padding:12px; font-size:15px; }
    .jrsvp button.primary{ padding:15px; font-size:15px; }
    .jrsvp .party-names{ font-size:18px; }
    .jrsvp .selected-household{ flex-wrap:wrap; gap:8px; }
    table.planner-table{ font-size:11px; }
    .jrsvp .planner-bar{ flex-direction:column; align-items:stretch; }
    .jrsvp .progress-track{ margin:8px 0; }
    .jrsvp .watermark img{ width:90px; }
  }
</style>

  const root = document.getElementById('jrsvpRoot');
  let planner = location.hash === '#planner';
  let selectedHouseholdIdx = null;
  let selectedPartyIdx = null;
  let searchTerm = '';

  function slug(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,'-'); }
  function partyKey(hIdx, pIdx){ return 'rsvp-party:' + hIdx + ':' + pIdx; }

  async function getPartyResponse(hIdx, pIdx){
    try{
      const res = await fetch(`${SHEETS_API_URL}?action=get&hIdx=${hIdx}&pIdx=${pIdx}`);
      const data = await res.json();
      if(!data) return null;
      return { meals: data.meals, savedAt: data.respondedAt };
    }catch(e){ return null; }
  }
  async function savePartyResponse(hIdx, pIdx, meals){
    const h = GUEST_DIRECTORY[hIdx];
    const party = h.parties[pIdx];
    const payload = {
      hIdx, pIdx,
      household: h.household,
      guestNames: party.map(g=>g.name).join(' & '),
      meals,
      respondedAt: new Date().toISOString()
    };
    try{
      await fetch(SHEETS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
    }catch(e){ /* network hiccup - UI will just show not-yet-saved on next check */ }
    return payload;
  }

  function esc(s){
    return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function matchParties(term){
    const t = term.trim().toLowerCase();
    if(!t) return [];
    const results = [];
    GUEST_DIRECTORY.forEach((h, hIdx) => {
      h.parties.forEach((party, pIdx) => {
        const names = party.map(g=>g.name).join(' & ');
        const matchesLast = h.last && h.last.toLowerCase().includes(t);
        const matchesGuest = party.some(g => g.name.toLowerCase().includes(t));
        if(matchesLast || matchesGuest){
          results.push({ hIdx, pIdx, names });
        }
      });
    });
    return results.slice(0, 12);
  }

  async function partyStatus(hIdx, pIdx){
    const party = GUEST_DIRECTORY[hIdx].parties[pIdx];
    const resp = await getPartyResponse(hIdx, pIdx);
    const responded = !!(resp && resp.meals && resp.meals.every(m => m));
    return { total: party.length, responded };
  }

  async function renderGuestView(){
    root.className = 'jrsvp';
    let html = '';
    html += `<div class="wrap">`;
    html += `<div class="header-photo"><img src="data:image/jpeg;base64,${HEADER_PHOTO_B64}" alt="Wedding photo"/></div>`;
    html += `<h1>The Jinadu Wedding</h1>`;
    html += `<div class="sub">Dinner Entree Selection</div>`;
    html += `<div class="tag">Please choose one entree for each guest in your party</div>`;
    html += `<div class="divider"><span></span><em>&#10047;</em><span></span></div>`;
    html += `<div class="card" id="jrsvpCard">`;

    if(selectedPartyIdx === null){
      html += `<div class="field">
        <label>Find your name</label>
        <input type="text" id="jrsvpSearch" placeholder="Type your last name" autocomplete="off" value="${esc(searchTerm)}"/>
      </div>
      <div id="jrsvpMatches"></div>`;
    } else {
      const h = GUEST_DIRECTORY[selectedHouseholdIdx];
      const party = h.parties[selectedPartyIdx];
      const names = party.map(g=>g.name).join(' & ');
      html += `<div class="selected-household">
        <span class="hh">${esc(names)}</span>
        <button id="jrsvpChange">Not you?</button>
      </div>
      <div id="jrsvpParties"></div>`;
    }

    html += `</div>`;
    html += `<div class="footer-links"><a id="jrsvpPlannerLink">Wedding planner view</a></div>`;
    html += `<div class="watermark"><img src="data:image/png;base64,${MONOGRAM_B64}" alt=""/></div>`;
    html += `</div>`;
    root.innerHTML = html;

    if(selectedPartyIdx === null){
      const input = document.getElementById('jrsvpSearch');
      input.addEventListener('input', (e)=>{ searchTerm = e.target.value; renderMatches(); });
      input.focus();
      renderMatches();
    } else {
      document.getElementById('jrsvpChange').addEventListener('click', ()=>{
        selectedHouseholdIdx = null; selectedPartyIdx = null; searchTerm=''; renderGuestView();
      });
      renderParties();
    }
    document.getElementById('jrsvpPlannerLink').addEventListener('click', ()=>{
      location.hash = 'planner'; planner = true; renderPlannerView();
    });
  }

  async function renderMatches(){
    const container = document.getElementById('jrsvpMatches');
    if(!container) return;
    const matches = matchParties(searchTerm);
    if(!searchTerm.trim()){ container.innerHTML=''; return; }
    if(matches.length === 0){
      container.innerHTML = `<div class="no-match">We couldn't find that name. Please check the spelling, or reach out to the couple directly if you believe this is an error.</div>`;
      return;
    }
    container.innerHTML = `<div class="matches">` + matches.map(({hIdx,pIdx,names}) => {
      const rowId = hIdx+'-'+pIdx;
      return `<div class="match-row" data-hidx="${hIdx}" data-pidx="${pIdx}">
        <span class="hh">${esc(names)}</span>
        <span class="cnt" id="cnt-${rowId}">Checking&hellip;</span>
      </div>`;
    }).join('') + `</div>`;
    container.querySelectorAll('.match-row').forEach(row=>{
      row.addEventListener('click', ()=>{
        selectedHouseholdIdx = parseInt(row.dataset.hidx,10);
        selectedPartyIdx = parseInt(row.dataset.pidx,10);
        renderGuestView();
      });
    });
    for(const {hIdx,pIdx} of matches){
      const rowId = hIdx+'-'+pIdx;
      partyStatus(hIdx,pIdx).then(({total, responded})=>{
        const el = document.getElementById('cnt-'+rowId);
        if(!el) return;
        if(responded){
          el.textContent = 'Responded';
          el.classList.add('done');
        } else {
          el.textContent = `${total} guest${total>1?'s':''}`;
        }
      });
    }
  }

  async function renderParties(){
    const container = document.getElementById('jrsvpParties');
    if(!container) return;
    const pIdx = selectedPartyIdx;
    container.innerHTML = `<div class="party" data-pidx="${pIdx}">
      <div class="party-head">
        <span class="party-status" id="pstatus-${pIdx}">Checking&hellip;</span>
      </div>
      <div id="pbody-${pIdx}"></div>
    </div>`;
    await renderPartyBody(pIdx);
  }

  async function renderPartyBody(pIdx){
    const h = GUEST_DIRECTORY[selectedHouseholdIdx];
    const party = h.parties[pIdx];
    const resp = await getPartyResponse(selectedHouseholdIdx, pIdx);
    const meals = resp ? resp.meals.slice() : party.map(()=>null);
    const bodyEl = document.getElementById('pbody-'+pIdx);
    const statusEl = document.getElementById('pstatus-'+pIdx);
    const allDone = meals.every(m=>m);
    if(statusEl){
      statusEl.textContent = allDone ? 'Responded' : `0 of ${party.length} responded`;
      statusEl.className = 'party-status' + (allDone ? ' done' : '');
    }
    if(!bodyEl) return;

    let html = '';
    party.forEach((g, gi) => {
      html += `<div class="guest-line">
        <div class="guest-name">${esc(g.name)}</div>
        ${g.diet && g.diet.toUpperCase()!=='NA' ? `<div class="guest-diet">Noted dietary restriction: ${esc(g.diet)}</div>` : ''}
        <div class="meal-options" data-gi="${gi}">
          ${MEAL_OPTIONS.map(opt => `
            <label class="meal-opt ${meals[gi]===opt?'checked':''}">
              <input type="radio" name="meal-${pIdx}-${gi}" value="${esc(opt)}" ${meals[gi]===opt?'checked':''}/>
              ${esc(opt)}
            </label>`).join('')}
        </div>
      </div>`;
    });
    html += `<div class="submit-row">
      <button class="primary" id="submit-${pIdx}" ${allDone?'disabled':''}>${allDone ? 'Saved' : 'Submit selection'}</button>
      <div class="party-saved" id="saved-${pIdx}" style="display:${allDone?'block':'none'}">Thank you &mdash; your selection has been saved.</div>
    </div>`;
    bodyEl.innerHTML = html;

    bodyEl.querySelectorAll('.meal-options').forEach(group=>{
      const gi = parseInt(group.dataset.gi,10);
      group.querySelectorAll('input[type=radio]').forEach(inp=>{
        inp.addEventListener('change', ()=>{
          meals[gi] = inp.value;
          group.querySelectorAll('.meal-opt').forEach(l=>l.classList.remove('checked'));
          inp.closest('.meal-opt').classList.add('checked');
          updateSubmitState();
        });
      });
    });
    function updateSubmitState(){
      const btn = document.getElementById('submit-'+pIdx);
      const ready = meals.every(m=>m);
      btn.disabled = !ready;
      btn.textContent = ready ? 'Submit selection' : 'Submit selection';
    }
    const submitBtn = document.getElementById('submit-'+pIdx);
    submitBtn.addEventListener('click', async ()=>{
      if(!meals.every(m=>m)) return;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';
      await savePartyResponse(selectedHouseholdIdx, pIdx, meals);
      await renderPartyBody(pIdx);
    });
  }

  // ---------- Planner view ----------
  async function renderPlannerView(){
    root.className = 'jrsvp planner-mode';
    let html = `<div class="wrap">
      <h1>Wedding Planner View</h1>
      <div class="sub">Meal Selection Overview</div>
      <div class="divider"><span></span><em>&#10047;</em><span></span></div>
      <div class="card">
        <div class="planner-bar">
          <span class="progress-text" id="plannerProgressText">Loading…</span>
          <div class="progress-track"><div class="progress-fill" id="plannerProgressFill" style="width:0%"></div></div>
        </div>
        <div class="planner-actions">
          <button class="ghost" id="plannerExport">Export to Excel</button>
          <button class="ghost" id="plannerBackLink">Back to guest view</button>
        </div>
        <div class="field planner-search">
          <input type="text" id="plannerSearch" placeholder="Filter by household or guest name"/>
        </div>
        <div style="overflow-x:auto">
        <table class="planner-table" id="plannerTable">
          <thead><tr><th>Household</th><th>Guest</th><th>Meal</th><th>Status</th></tr></thead>
          <tbody id="plannerBody"><tr><td colspan="4">Loading responses…</td></tr></tbody>
        </table>
        </div>
      </div>
      <div class="footer-links"></div>
      <div class="watermark"><img src="data:image/png;base64,${MONOGRAM_B64}" alt=""/></div>
    </div>`;
    root.innerHTML = html;

    document.getElementById('plannerBackLink').addEventListener('click', ()=>{
      location.hash=''; planner=false; selectedHouseholdIdx=null; selectedPartyIdx=null; renderGuestView();
    });
    document.getElementById('plannerSearch').addEventListener('input', renderPlannerTable);
    document.getElementById('plannerExport').addEventListener('click', exportXlsx);

    await loadAllResponses();
    renderPlannerTable();
  }

  let ALL_ROWS = [];
  async function loadAllResponses(){
    const rows = [];
    let totalGuests = 0, respondedGuests = 0;

    let sheetData = [];
    try{
      const res = await fetch(`${SHEETS_API_URL}?action=getAll`);
      sheetData = await res.json();
    }catch(e){ sheetData = []; }

    const lookup = {};
    sheetData.forEach(r => { lookup[r.hIdx + ':' + r.pIdx] = r.meals; });

    for(let hIdx=0; hIdx<GUEST_DIRECTORY.length; hIdx++){
      const h = GUEST_DIRECTORY[hIdx];
      for(let pIdx=0; pIdx<h.parties.length; pIdx++){
        const party = h.parties[pIdx];
        const meals = lookup[hIdx + ':' + pIdx] || party.map(()=>null);
        party.forEach((g, gi)=>{
          totalGuests++;
          const meal = meals[gi];
          if(meal) respondedGuests++;
          rows.push({ household: h.household, guest: g.name, meal: meal || '', responded: !!meal });
        });
      }
    }
    ALL_ROWS = rows;
    const pct = totalGuests ? Math.round((respondedGuests/totalGuests)*100) : 0;
    const progText = document.getElementById('plannerProgressText');
    const progFill = document.getElementById('plannerProgressFill');
    if(progText) progText.textContent = `${respondedGuests} of ${totalGuests} guests responded (${pct}%)`;
    if(progFill) progFill.style.width = pct + '%';
  }

  function renderPlannerTable(){
    const term = (document.getElementById('plannerSearch')?.value || '').toLowerCase().trim();
    const body = document.getElementById('plannerBody');
    if(!body) return;
    const filtered = term ? ALL_ROWS.filter(r => r.household.toLowerCase().includes(term) || r.guest.toLowerCase().includes(term)) : ALL_ROWS;
    if(filtered.length === 0){
      body.innerHTML = `<tr><td colspan="4">No matches.</td></tr>`;
      return;
    }
    body.innerHTML = filtered.map(r => `<tr>
      <td>${esc(r.household)}</td>
      <td>${esc(r.guest)}</td>
      <td>${esc(r.meal) || '&mdash;'}</td>
      <td><span class="pill ${r.responded?'yes':'no'}">${r.responded ? 'Responded' : 'Pending'}</span></td>
    </tr>`).join('');
  }

  function exportXlsx(){
    const data = ALL_ROWS.map(r => ({
      Household: r.household,
      Guest: r.guest,
      'Meal Selection': r.meal || '',
      Status: r.responded ? 'Responded' : 'Pending'
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Meal Selections');
    XLSX.writeFile(wb, 'jinadu-wedding-meal-selections.xlsx');
  }

  // ---------- init ----------
  function loadXlsxLib(cb){
    if(window.XLSX){ cb(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = cb;
    document.head.appendChild(s);
  }

  window.addEventListener('hashchange', ()=>{
    planner = location.hash === '#planner';
    if(planner){ loadXlsxLib(renderPlannerView); } else { selectedHouseholdIdx=null; selectedPartyIdx=null; renderGuestView(); }
  });

  if(planner){
    loadXlsxLib(renderPlannerView);
  } else {
    renderGuestView();
  }
})();
